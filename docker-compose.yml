services:
  mysql:
    image: mysql:8.4
    container_name: station-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: station_db
      MYSQL_USER: station_user
      MYSQL_PASSWORD: station_password
    ports:
      - "3214:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    container_name: station-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: station_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "3215:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d station_db"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: station-redis
    restart: unless-stopped
    profiles: ["cache"]
    ports:
      - "3216:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: station-adminer
    restart: unless-stopped
    profiles: ["dbweb"]
    ports:
      - "3217:8080"
    volumes:
      - ./storage/sqlite:/var/lib/station-sqlite:ro

volumes:
  mysql_data:
  postgres_data:
  redis_data:
