[graph]
all-features = false
no-default-features = false

[advisories]
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "Transitive through sqlx-mysql; no patched rsa release is available yet, and this service does not perform RSA private-key operations. Revisit when sqlx or rsa ships a fix." },
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false

[bans]
multiple-versions = "allow"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
