name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Verify workspace
        run: ./scripts/verify_repo.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build example frontend
        run: npm run build

  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: station_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 3215:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d station_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Verify Postgres ingest/export flow
        run: ./scripts/verify_ingest_export.sh postgres

      - name: Package SQLite release artifact
        run: ./scripts/release_sqlite_artifact.sh postgres

      - name: Upload SQLite artifact smoke bundle
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-artifact-postgres-smoke
          path: artifacts/sqlite/
          if-no-files-found: error

  integration-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: station_db
          MYSQL_USER: station_user
          MYSQL_PASSWORD: station_password
        ports:
          - 3214:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot_password --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Verify MySQL ingest/export flow
        run: ./scripts/verify_ingest_export.sh mysql
